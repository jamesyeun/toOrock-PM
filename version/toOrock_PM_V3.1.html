<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>toOrock PM v3.1</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
[data-theme="dark"] {
  --bg: #111113;
  --surface: #18181b;
  --card: #1c1c20;
  --card-hover: #222228;
  --border: #2e2e36;
  --border-sub: #252530;
  --text: #e4e4e8;
  --text-muted: #8888a0;
  --text-dim: #44444e;
  --accent-dim: rgba(212,212,216,0.08);
  --accent-glow: rgba(212,212,216,0.15);
  --success: #a8e6c4;
  --success-bg: rgba(168,230,196,0.10);
  --warning: #f0c27a;
  --warning-bg: rgba(240,194,122,0.10);
  --danger: #f4a0a0;
  --danger-bg: rgba(244,160,160,0.10);
  --high-c: #f4a0a0; --high-bg: rgba(244,160,160,0.10);
  --mid-c: #f0c27a;  --mid-bg: rgba(240,194,122,0.10);
  --low-c: #a8e6c4;  --low-bg: rgba(168,230,196,0.10);
  --bar-track: #2a2a32;
  --memo-bg: #14141a;
  --input-bg: #111113;
  --shadow: 0 8px 32px rgba(0,0,0,0.45);
}

[data-theme="light"] {
  --bg: #f4f4f5;
  --surface: #ffffff;
  --card: #ffffff;
  --card-hover: #fafafa;
  --border: #d4d4d8;
  --border-sub: #e4e4e7;
  --text: #18181b;
  --text-muted: #71717a;
  --text-dim: #a1a1aa;
  --accent-dim: rgba(63,63,70,0.07);
  --accent-glow: rgba(63,63,70,0.13);
  --success: #16a34a;
  --success-bg: rgba(22,163,74,0.08);
  --warning: #b45309;
  --warning-bg: rgba(180,83,9,0.08);
  --danger: #dc2626;
  --danger-bg: rgba(220,38,38,0.08);
  --high-c: #dc2626; --high-bg: rgba(220,38,38,0.08);
  --mid-c: #b45309;  --mid-bg: rgba(180,83,9,0.08);
  --low-c: #16a34a;  --low-bg: rgba(22,163,74,0.08);
  --bar-track: #e4e4e7;
  --memo-bg: #f9f9fa;
  --input-bg: #f4f4f5;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background .25s, color .25s;
}

/* ── HEADER ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border-sub);
  padding: 0 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 56px;
  flex-wrap: wrap;
  gap: 8px;
  position: sticky;
  top: 0;
  z-index: 100;
  transition: background .25s;
}

.logo {
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); }
.logo-ver { font-size: 10px; color: var(--text-dim); font-weight: 400; }

.header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.header-stats { display: flex; gap: 10px; font-size: 12px; color: var(--text-muted); }
.stat-val { color: var(--text); font-weight: 500; font-family: 'DM Mono', monospace; }
.stat-val.s-done { color: var(--success); }

.conn-badge {
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 5px;
}
.conn-badge.connected { color: var(--success); border-color: var(--success-bg); background: var(--success-bg); }
.conn-badge.error { color: var(--danger); border-color: var(--danger-bg); background: var(--danger-bg); }
.conn-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

.theme-toggle {
  display: flex;
  background: var(--accent-dim);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px;
  cursor: pointer;
}
.toggle-opt {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 16px;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
  transition: .2s;
  user-select: none;
}
.toggle-opt.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,.15); }

/* ── SETUP BANNER ── */
.setup-banner {
  background: var(--warning-bg);
  border: 1px solid var(--warning);
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 20px;
  font-size: 13px;
  color: var(--warning);
  line-height: 1.7;
}
.setup-banner strong { font-weight: 700; display: block; margin-bottom: 4px; font-size: 14px; }
.setup-banner code {
  background: rgba(0,0,0,0.15);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
}

/* ── MAIN ── */
.main { max-width: 1180px; margin: 0 auto; padding: 28px 20px; }

.add-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  background: var(--surface);
  border: 1px solid var(--border-sub);
  border-radius: 14px;
  padding: 12px 14px;
  box-shadow: var(--shadow);
  transition: background .25s;
}
.add-bar input {
  flex: 1;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 9px 13px;
  color: var(--text);
  font-size: 14px;
  font-family: 'Noto Sans KR', sans-serif;
  outline: none;
  transition: border-color .2s;
}
.add-bar input:focus { border-color: var(--text-muted); }
.add-bar input::placeholder { color: var(--text-dim); }

.btn-create {
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: 9px;
  padding: 9px 18px;
  font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity .2s, transform .1s, background .25s, color .25s;
}
.btn-create:hover { opacity: .8; }
.btn-create:active { transform: scale(.97); }
.btn-create:disabled { opacity: .4; cursor: not-allowed; }

.filter-bar { display: flex; gap: 6px; margin-bottom: 22px; flex-wrap: wrap; align-items: center; }
.filter-label { font-size: 11px; color: var(--text-dim); font-family: 'DM Mono', monospace; margin-right: 2px; }
.filter-btn {
  font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  padding: 5px 13px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: .18s;
}
.filter-btn:hover { border-color: var(--text-muted); color: var(--text); }
.filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 500; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 16px; }

/* ── CARD ── */
.card {
  background: var(--card);
  border: 1px solid var(--border-sub);
  border-radius: 16px;
  overflow: hidden;
  transition: border-color .2s, box-shadow .2s, background .25s;
  box-shadow: var(--shadow);
}
.card:hover { border-color: var(--border); }
.card-top { padding: 18px 18px 0; }
.card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; gap: 6px; }
.card-title { font-size: 14px; font-weight: 500; color: var(--text); flex: 1; line-height: 1.45; }

/* ── 접기 버튼 ── */
.btn-collapse {
  background: transparent;
  border: none;
  color: var(--text-dim);
  font-size: 14px;
  cursor: pointer;
  padding: 2px 4px;
  line-height: 1;
  transition: transform .3s, color .15s;
  flex-shrink: 0;
}
.btn-collapse:hover { color: var(--text-muted); }
.card.collapsed .btn-collapse { transform: rotate(-90deg); }

/* ── 카드 바디 접기 애니메이션 ── */
.card-body {
  max-height: 2000px;
  opacity: 1;
  overflow: hidden;
  transition: max-height .4s ease, opacity .3s ease;
}
.card.collapsed .card-body {
  max-height: 0;
  opacity: 0;
}

.btn-del-card {
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-dim);
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 6px;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: .15s;
  flex-shrink: 0;
}
.btn-del-card:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-bg); }

.prog-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; }
.prog-pct { font-family: 'DM Mono', monospace; font-weight: 500; color: var(--text); }
.prog-pct.all-done { color: var(--success); }

.bar-bg { height: 3px; background: var(--bar-track); border-radius: 3px; overflow: hidden; margin-bottom: 14px; transition: background .25s; }
.bar-fill { height: 100%; background: var(--text-muted); border-radius: 3px; transition: width .4s ease; }
.bar-fill.done { background: var(--success); }

.memo-wrap {
  margin: 0 18px 12px;
  background: var(--memo-bg);
  border: 1px solid var(--border-sub);
  border-radius: 9px;
  padding: 8px 11px;
  transition: background .25s;
}
.memo-label { font-size: 9px; font-family: 'DM Mono', monospace; color: var(--text-dim); letter-spacing: .08em; margin-bottom: 3px; }
.memo-wrap textarea {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text-muted);
  font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  resize: none;
  line-height: 1.6;
}
.memo-wrap textarea::placeholder { color: var(--text-dim); }

.task-section { padding: 0 18px; }

/* ── TASK 일반 ── */
.task-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 0;
  border-bottom: 1px solid var(--border-sub);
  font-size: 13px;
  transition: border-color .25s;
}
.task-item:last-child { border-bottom: none; }
.task-item.completed .task-text { text-decoration: line-through; color: var(--text-dim); }
.task-item input[type=checkbox] { width: 14px; height: 14px; cursor: pointer; accent-color: var(--text-muted); flex-shrink: 0; }
.task-text { flex: 1; color: var(--text); line-height: 1.4; cursor: pointer; }
.task-text:hover { color: var(--text-muted); }
.task-meta { display: flex; gap: 4px; align-items: center; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }

/* ── TASK 편집 모드 ── */
.task-edit-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.task-edit-row1 { display: flex; gap: 5px; }
.task-edit-row2 { display: flex; gap: 5px; align-items: center; }

.task-edit-wrap input,
.task-edit-wrap select {
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  padding: 5px 8px;
  outline: none;
  transition: border-color .2s;
}
.task-edit-wrap input:focus,
.task-edit-wrap select:focus { border-color: var(--text-muted); }
.task-edit-wrap input::placeholder { color: var(--text-dim); }
.task-edit-wrap select option { background: var(--card); }

.i-edit-text { flex: 1; }
.i-edit-asn  { width: 72px; }
.i-edit-date { width: 118px; font-size: 11px !important; }
.i-edit-pri  { width: 70px; }

.btn-edit-save {
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 11px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity .2s;
}
.btn-edit-save:hover { opacity: .75; }

.btn-edit-cancel {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  border-radius: 6px;
  padding: 5px 8px;
  font-size: 11px;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  transition: .15s;
}
.btn-edit-cancel:hover { border-color: var(--text-muted); color: var(--text); }

/* 편집 힌트 */
.task-edit-hint {
  font-size: 10px;
  color: var(--text-dim);
  padding: 4px 0 2px;
  font-family: 'DM Mono', monospace;
}

.badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; white-space: nowrap; font-family: 'DM Mono', monospace; }
.b-high { background: var(--high-bg); color: var(--high-c); }
.b-mid  { background: var(--mid-bg);  color: var(--mid-c); }
.b-low  { background: var(--low-bg);  color: var(--low-c); }
.b-ok   { background: var(--success-bg); color: var(--success); }
.b-soon { background: var(--warning-bg); color: var(--warning); }
.b-over { background: var(--danger-bg);  color: var(--danger); }
.b-asn  { background: var(--accent-dim); color: var(--text-muted); font-family: 'Noto Sans KR', sans-serif; font-size: 10px; }

.btn-del-task {
  background: transparent;
  border: none;
  color: var(--text-dim);
  font-size: 14px;
  line-height: 1;
  cursor: pointer;
  padding: 0 2px;
  transition: color .15s;
  flex-shrink: 0;
}
.btn-del-task:hover { color: var(--danger); }

.add-task-wrap {
  background: var(--memo-bg);
  border-top: 1px solid var(--border-sub);
  padding: 12px 18px;
  transition: background .25s;
}
.add-task-r1, .add-task-r2 { display: flex; gap: 6px; margin-bottom: 6px; }
.add-task-r2 { margin-bottom: 0; align-items: center; }

.add-task-wrap input,
.add-task-wrap select {
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  padding: 6px 10px;
  outline: none;
  transition: border-color .2s;
}
.add-task-wrap input:focus, .add-task-wrap select:focus { border-color: var(--text-muted); }
.add-task-wrap input::placeholder { color: var(--text-dim); }
.add-task-wrap select option { background: var(--card); }

.i-text { flex: 1; }
.i-asn  { width: 80px; }
.i-date { width: 130px; font-size: 11px !important; }
.i-pri  { width: 78px; }

.btn-add-task {
  margin-left: auto;
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: 7px;
  padding: 6px 14px;
  font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity .2s, background .25s, color .25s;
}
.btn-add-task:hover { opacity: .75; }
.btn-add-task:disabled { opacity: .4; cursor: not-allowed; }

.empty { grid-column: 1/-1; text-align: center; color: var(--text-dim); padding: 64px 0; font-size: 14px; }
.no-tasks { font-size: 12px; color: var(--text-dim); padding: 10px 0 6px; font-style: italic; }

.loading { grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 64px 0; font-size: 13px; font-family: 'DM Mono', monospace; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.loading { animation: pulse 1.5s infinite; }

@media (max-width: 600px) {
  .main { padding: 16px 12px; }
  .grid { grid-template-columns: 1fr; gap: 12px; }
  .add-bar { padding: 10px 12px; }
  .header-stats { display: none; }
  .conn-badge span { display: none; }
  .conn-badge { padding: 4px 8px; }
  .logo { font-size: 13px; }
  .add-task-r1 { flex-direction: column; }
  .i-asn { width: 100%; }
  .add-task-r2 { flex-wrap: wrap; }
  .i-date { width: 100%; }
  .i-pri { width: 100%; }
  .btn-add-task { width: 100%; margin-left: 0; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-dot"></div>
    toOrock_PM
    <span class="logo-ver">v3.1</span>
  </div>
  <div class="header-right">
    <div class="conn-badge" id="connBadge">
      <div class="conn-dot"></div>
      <span id="connText">연결 중...</span>
    </div>
    <div class="header-stats" id="hStats"></div>
    <div class="theme-toggle" onclick="toggleTheme()">
      <div class="toggle-opt" id="opt-dark">dark</div>
      <div class="toggle-opt" id="opt-light">light</div>
    </div>
  </div>
</div>

<div class="main">
  <div id="setupBanner" class="setup-banner" style="display:none">
    <strong>⚠️ Supabase 설정이 필요합니다</strong>
    이 파일을 텍스트 편집기로 열어서 상단의 <code>SUPABASE_URL</code>과 <code>SUPABASE_KEY</code>를 본인의 값으로 교체해 주세요.
  </div>

  <div class="add-bar">
    <input type="text" id="pInput" placeholder="새 프로젝트 이름...">
    <button class="btn-create" id="btnCreate" onclick="addProject()">+ 프로젝트 생성</button>
  </div>

  <div class="filter-bar">
    <span class="filter-label">FILTER</span>
    <button class="filter-btn active" onclick="setFilter(this,'all')">전체</button>
    <button class="filter-btn" onclick="setFilter(this,'active')">진행 중</button>
    <button class="filter-btn" onclick="setFilter(this,'done')">완료</button>
    <button class="filter-btn" onclick="setFilter(this,'urgent')">D-3 긴급</button>
  </div>

  <div id="grid" class="grid">
    <div class="loading">Supabase 연결 중...</div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  ★★★ 여기에 본인의 Supabase 정보를 입력하세요 ★★★
// ══════════════════════════════════════════════════════
const SUPABASE_URL = 'https://dlnluxtuelcmclgvqlcw.supabase.co';   // 예: https://abcdefgh.supabase.co
const SUPABASE_KEY = 'sb_publishable_3_z202lUdeRrwak9vo1k3w_RrFZ9xey';   // Publishable key (default)
// ══════════════════════════════════════════════════════

const { createClient } = supabase;
let sb = null;
let projects = [];
let taskFilter = 'all';
let theme = localStorage.getItem('toOrock_theme') || 'dark';
let isConnected = false;

// 편집 중인 Task ID 추적
let editingTaskId = null;

// ── 초기화 ──────────────────────────────────────────
async function init() {
  applyTheme();

  if (SUPABASE_URL === 'YOUR_SUPABASE_URL' || SUPABASE_KEY === 'YOUR_SUPABASE_KEY') {
    document.getElementById('setupBanner').style.display = 'block';
    setConnState(false, '키 미설정');
    document.getElementById('grid').innerHTML = '<div class="empty">상단 안내에 따라 Supabase 키를 설정해 주세요</div>';
    return;
  }

  try {
    sb = createClient(SUPABASE_URL, SUPABASE_KEY);
    await loadProjects();
    setConnState(true, '연결됨');
    isConnected = true;
  } catch(e) {
    setConnState(false, '연결 실패');
    document.getElementById('grid').innerHTML = '<div class="empty">Supabase 연결에 실패했습니다. URL과 키를 확인해 주세요.</div>';
  }
}

function setConnState(ok, text) {
  const badge = document.getElementById('connBadge');
  const span  = document.getElementById('connText');
  badge.className = 'conn-badge ' + (ok ? 'connected' : 'error');
  span.textContent = text;
}

// ── 데이터 로드 ──────────────────────────────────────
async function loadProjects() {
  document.getElementById('grid').innerHTML = '<div class="loading">불러오는 중...</div>';

  const { data: pData, error: pErr } = await sb.from('projects').select('*').order('created_at', { ascending: false });
  if (pErr) throw pErr;

  const { data: tData, error: tErr } = await sb.from('tasks').select('*').order('created_at', { ascending: true });
  if (tErr) throw tErr;

  projects = pData.map(p => ({
    ...p,
    tasks: tData.filter(t => t.project_id === p.id)
  }));

  render();
}

// ── 프로젝트 ─────────────────────────────────────────
async function addProject() {
  if (!isConnected) return;
  const el = document.getElementById('pInput');
  const title = el.value.trim();
  if (!title) return;

  document.getElementById('btnCreate').disabled = true;
  const { data, error } = await sb.from('projects').insert({ title, memo: '' }).select().single();
  document.getElementById('btnCreate').disabled = false;

  if (error) { alert('프로젝트 생성 실패: ' + error.message); return; }
  el.value = '';
  projects.unshift({ ...data, tasks: [] });
  render();
}

async function delProject(id) {
  if (!confirm('이 프로젝트를 삭제할까요?')) return;
  const { error } = await sb.from('projects').delete().eq('id', id);
  if (error) { alert('삭제 실패: ' + error.message); return; }
  projects = projects.filter(p => p.id !== id);
  render();
}

// ── 카드 접기/펼치기 ─────────────────────────────────
function toggleCollapse(pId) {
  const card = document.getElementById('card-' + pId);
  card.classList.toggle('collapsed');
}

let memoTimer = {};
async function updateMemo(id, val) {
  const p = projects.find(p => p.id === id);
  if (p) p.memo = val;
  clearTimeout(memoTimer[id]);
  memoTimer[id] = setTimeout(async () => {
    await sb.from('projects').update({ memo: val }).eq('id', id);
  }, 800);
}

// ── Task ─────────────────────────────────────────────
async function addTask(pId) {
  if (!isConnected) return;
  const txt = document.getElementById('ti-' + pId).value.trim();
  if (!txt) return;
  const asn = document.getElementById('ta-' + pId).value.trim();
  const due = document.getElementById('td-' + pId).value || null;
  const pri = document.getElementById('tp-' + pId).value || '';

  const btn = document.querySelector(`#card-${pId} .btn-add-task`);
  if (btn) btn.disabled = true;

  const { data, error } = await sb.from('tasks').insert({
    project_id: pId, text: txt, assignee: asn, due, priority: pri, done: false
  }).select().single();

  if (btn) btn.disabled = false;
  if (error) { alert('Task 추가 실패: ' + error.message); return; }

  const p = projects.find(p => p.id === pId);
  p.tasks.push(data);
  document.getElementById('ti-' + pId).value = '';
  document.getElementById('ta-' + pId).value = '';
  document.getElementById('td-' + pId).value = '';
  render();
}

async function toggleTask(pId, tId, done) {
  const { error } = await sb.from('tasks').update({ done }).eq('id', tId);
  if (error) { alert('업데이트 실패'); return; }
  const p = projects.find(p => p.id === pId);
  const t = p.tasks.find(t => t.id === tId);
  t.done = done;
  render();
}

async function delTask(pId, tId) {
  const { error } = await sb.from('tasks').delete().eq('id', tId);
  if (error) { alert('삭제 실패'); return; }
  const p = projects.find(p => p.id === pId);
  p.tasks = p.tasks.filter(t => t.id !== tId);
  render();
}

// ── Task 편집 ─────────────────────────────────────────
function startEditTask(tId) {
  editingTaskId = tId;
  render();
  // 편집 인풋에 포커스
  setTimeout(() => {
    const input = document.getElementById('edit-text-' + tId);
    if (input) input.focus();
  }, 50);
}

function cancelEditTask() {
  editingTaskId = null;
  render();
}

async function saveEditTask(pId, tId) {
  const txt = document.getElementById('edit-text-' + tId).value.trim();
  if (!txt) { alert('내용을 입력해 주세요'); return; }

  const asn = document.getElementById('edit-asn-' + tId).value.trim();
  const due = document.getElementById('edit-due-' + tId).value || null;
  const pri = document.getElementById('edit-pri-' + tId).value || '';

  const { error } = await sb.from('tasks').update({
    text: txt, assignee: asn, due, priority: pri
  }).eq('id', tId);

  if (error) { alert('수정 실패: ' + error.message); return; }

  const p = projects.find(p => p.id === pId);
  const t = p.tasks.find(t => t.id === tId);
  t.text = txt;
  t.assignee = asn;
  t.due = due;
  t.priority = pri;

  editingTaskId = null;
  render();
}

// ── 필터 / 유틸 ──────────────────────────────────────
function setFilter(btn, f) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  taskFilter = f;
  render();
}

function dday(due) {
  if (!due) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(due); d.setHours(0,0,0,0);
  return Math.ceil((d - today) / 86400000);
}

function ddayBadge(due) {
  if (!due) return '';
  const d = dday(due);
  if (d < 0)  return `<span class="badge b-over">D+${Math.abs(d)}</span>`;
  if (d <= 3) return `<span class="badge b-soon">D-${d}</span>`;
  return `<span class="badge b-ok">D-${d}</span>`;
}

function priBadge(p) {
  const m = { high:['b-high','높음'], mid:['b-mid','중간'], low:['b-low','낮음'] };
  if (!p || !m[p]) return '';
  return `<span class="badge ${m[p][0]}">${m[p][1]}</span>`;
}

// ── 렌더 ─────────────────────────────────────────────
function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  let total = 0, done = 0;
  projects.forEach(p => { total += p.tasks.length; done += p.tasks.filter(t => t.done).length; });

  document.getElementById('hStats').innerHTML =
    `프로젝트 <span class="stat-val">${projects.length}</span>
     &nbsp;·&nbsp; Task <span class="stat-val">${total}</span>
     &nbsp;·&nbsp; 완료 <span class="stat-val s-done">${done}</span>`;

  if (!projects.length) {
    grid.innerHTML = '<div class="empty">프로젝트를 생성해 주세요</div>';
    return;
  }

  projects.forEach(p => {
    let tasks = [...p.tasks];
    if (taskFilter === 'active')  tasks = tasks.filter(t => !t.done);
    else if (taskFilter === 'done')   tasks = tasks.filter(t => t.done);
    else if (taskFilter === 'urgent') tasks = tasks.filter(t => { const d = dday(t.due); return d !== null && d <= 3 && !t.done; });

    const tot = p.tasks.length;
    const dn  = p.tasks.filter(t => t.done).length;
    const pct = tot === 0 ? 0 : Math.round(dn / tot * 100);
    const allDone = pct === 100 && tot > 0;

    const rows = tasks.map(t => {
      // 편집 모드
      if (editingTaskId === t.id) {
        const priOptions = ['', 'high', 'mid', 'low'];
        const priLabels  = ['우선순위', '높음', '중간', '낮음'];
        const priSel = priOptions.map((v, i) =>
          `<option value="${v}" ${t.priority === v ? 'selected' : ''}>${priLabels[i]}</option>`
        ).join('');

        return `
          <div class="task-item">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask('${p.id}','${t.id}',this.checked)">
            <div class="task-edit-wrap">
              <div class="task-edit-row1">
                <input type="text" id="edit-text-${t.id}" class="i-edit-text" value="${t.text}" placeholder="할 일 내용...">
                <input type="text" id="edit-asn-${t.id}"  class="i-edit-asn"  value="${t.assignee || ''}" placeholder="담당자">
              </div>
              <div class="task-edit-row2">
                <input type="date" id="edit-due-${t.id}"  class="i-edit-date" value="${t.due || ''}">
                <select id="edit-pri-${t.id}" class="i-edit-pri">${priSel}</select>
                <button class="btn-edit-save" onclick="saveEditTask('${p.id}','${t.id}')">저장</button>
                <button class="btn-edit-cancel" onclick="cancelEditTask()">취소</button>
              </div>
            </div>
            <button class="btn-del-task" onclick="delTask('${p.id}','${t.id}')">×</button>
          </div>`;
      }

      // 일반 모드 — 텍스트 클릭하면 편집 모드 진입
      return `
        <div class="task-item ${t.done ? 'completed' : ''}">
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask('${p.id}','${t.id}',this.checked)">
          <span class="task-text" onclick="startEditTask('${t.id}')" title="클릭하여 편집">${t.text}</span>
          <span class="task-meta">
            ${t.assignee ? `<span class="badge b-asn">${t.assignee}</span>` : ''}
            ${priBadge(t.priority)}
            ${ddayBadge(t.due)}
            <button class="btn-del-task" onclick="delTask('${p.id}','${t.id}')">×</button>
          </span>
        </div>`;
    }).join('');

    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${p.id}`;
    card.innerHTML = `
      <div class="card-top">
        <div class="card-header">
          <span class="card-title">${p.title}</span>
          <button class="btn-collapse" onclick="toggleCollapse('${p.id}')" title="접기/펼치기">▾</button>
          <button class="btn-del-card" onclick="delProject('${p.id}')">삭제</button>
        </div>
        <div class="prog-row">
          <span>${dn}/${tot} Tasks</span>
          <span class="prog-pct ${allDone ? 'all-done' : ''}">${pct}%</span>
        </div>
        <div class="bar-bg"><div class="bar-fill ${allDone ? 'done' : ''}" style="width:${pct}%"></div></div>
      </div>
      <div class="card-body">
        <div class="memo-wrap">
          <div class="memo-label">MEMO</div>
          <textarea rows="2" placeholder="메모 또는 코멘트..." oninput="updateMemo('${p.id}',this.value)">${p.memo || ''}</textarea>
        </div>
        <div class="task-section">
          <div class="task-edit-hint">Task 텍스트를 클릭하면 편집할 수 있습니다</div>
          <div class="task-list">
            ${rows || '<div class="no-tasks">표시할 Task가 없습니다</div>'}
          </div>
        </div>
        <div class="add-task-wrap">
          <div class="add-task-r1">
            <input type="text" id="ti-${p.id}" class="i-text" placeholder="새 할 일 내용...">
            <input type="text" id="ta-${p.id}" class="i-asn"  placeholder="담당자">
          </div>
          <div class="add-task-r2">
            <input type="date" id="td-${p.id}" class="i-date">
            <select id="tp-${p.id}" class="i-pri">
              <option value="">우선순위</option>
              <option value="high">높음</option>
              <option value="mid">중간</option>
              <option value="low">낮음</option>
            </select>
            <button class="btn-add-task" onclick="addTask('${p.id}')">+ 추가</button>
          </div>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

// ── 테마 ─────────────────────────────────────────────
function applyTheme() {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('opt-dark').classList.toggle('active', theme === 'dark');
  document.getElementById('opt-light').classList.toggle('active', theme === 'light');
  localStorage.setItem('toOrock_theme', theme);
}
function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  applyTheme();
}

document.getElementById('pInput').addEventListener('keydown', e => { if (e.key === 'Enter') addProject(); });
init();
</script>
</body>
</html>
